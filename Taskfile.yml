version: '3'

tasks:
  format:
    cmds:
    - deno fmt README.md
    - gofmt -w .
  lint: golangci-lint run --fix --timeout "10m"
  test: go run github.com/onsi/ginkgo/v2/ginkgo -cover -race -r
  web:
    desc: Bundle the web UI from web/ into webdist/ (embedded into the binary via go:embed)
    cmds:
    - yarn install
    - yarn build:web
    sources:
    - web/**/*
    generates:
    - webdist/index.html
    - webdist/assets/*
  server:
    deps: [web]
    cmd: go run loge/main.go --port 6500 --payload-size 100000 --buckets 2
  server-drop: go run loge/main.go --port 6500 --payload-size 100000 --buckets 2 --drop-on-backpressure
  proto:
    desc: Generate protobuf Go code
    cmds:
    - protoc --go_out=. --go_opt=paths=source_relative proto/payload.proto
    sources:
    - proto/*.proto
    generates:
    - proto/*.pb.go
  ruby:test:
    desc: Run the Ruby gem test suite (ruby/)
    dir: ruby
    cmds:
    - bundle install --quiet
    - bundle exec rspec
  default:
    cmds:
    - GOFLAGS='-mod=mod' go generate ./...
    - task: web
    - task: format
    - task: lint
    - task: test
  bench:
    desc: Run benchmarks (starts server, runs k6 tests, then stops server)
    cmds:
    - rm -Rf tmp/
    - go test -bench=. -benchmem -run ^$
    - go build -o /tmp/loge-bench ./loge/main.go
    - |
      # Function to start server and wait for it to be ready
      start_server() {
        rm -Rf tmp/
        # Kill any existing processes on port 6500
        lsof -ti:6500 | xargs kill -9 2>/dev/null || true
        sleep 1
        /tmp/loge-bench --port 6500 --payload-size 100000 --buckets 2 &

        echo "Waiting for server to be ready..."
        for i in $(seq 1 30); do
          if nc -z localhost 6500 2>/dev/null; then
            # go-task's shell (mvdan/sh) reports job ids like "g1" for $! and
            # has no kill builtin — use the port's real PID and /bin/kill.
            SERVER_PID=$(lsof -ti:6500)
            echo "Server is ready (PID $SERVER_PID)!"
            return 0
          fi
          if [ $i -eq 30 ]; then
            echo "Server failed to start within 30 seconds"
            return 1
          fi
          sleep 1
        done
      }
      
      # Function to stop server and wait for graceful shutdown (flushes backpressure)
      stop_server() {
        if [ -n "$SERVER_PID" ]; then
          echo "Stopping server (PID $SERVER_PID) and waiting for flush..."
          /bin/kill -TERM $SERVER_PID 2>/dev/null || true
          # Wait for process to exit with timeout
          for i in $(seq 1 60); do
            if ! /bin/kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server stopped and flushed."
              SERVER_PID=""
              return 0
            fi
            sleep 1
          done
          echo "Server did not exit within 60s, force killing..."
          /bin/kill -9 $SERVER_PID 2>/dev/null || true
          sleep 1
        fi
        SERVER_PID=""
      }
      
      # Cleanup on exit
      trap stop_server EXIT
      
      # Run msgpack benchmark
      echo ""
      echo "=========================================="
      echo "Running msgpack benchmark..."
      echo "=========================================="
      start_server || exit 1
      k6 run benchmark/streams.msgpack.js
      stop_server
      
      # Run JSON benchmark
      echo ""
      echo "=========================================="
      echo "Running JSON benchmark..."
      echo "=========================================="
      start_server || exit 1
      k6 run benchmark/streams.json.js
      stop_server
      
      # Run protobuf benchmark
      echo ""
      echo "=========================================="
      echo "Running protobuf benchmark..."
      echo "=========================================="
      start_server || exit 1
      k6 run benchmark/streams.protobuf.js
      stop_server
      
      echo ""
      echo "All benchmarks complete!"
  bench-drop:
    desc: Run benchmarks with drop-on-backpressure enabled (faster, may lose data)
    cmds:
    - rm -Rf tmp/
    - go test -bench=. -benchmem -run ^$
    - go build -o /tmp/loge-bench ./loge/main.go
    - |
      # Function to start server with drop-on-backpressure
      start_server() {
        rm -Rf tmp/
        # Kill any existing processes on port 6500
        lsof -ti:6500 | xargs kill -9 2>/dev/null || true
        sleep 1
        /tmp/loge-bench --port 6500 --payload-size 100000 --buckets 2 --drop-on-backpressure &

        echo "Waiting for server to be ready..."
        for i in $(seq 1 30); do
          if nc -z localhost 6500 2>/dev/null; then
            # go-task's shell (mvdan/sh) reports job ids like "g1" for $! and
            # has no kill builtin — use the port's real PID and /bin/kill.
            SERVER_PID=$(lsof -ti:6500)
            echo "Server is ready (PID $SERVER_PID)!"
            return 0
          fi
          if [ $i -eq 30 ]; then
            echo "Server failed to start within 30 seconds"
            return 1
          fi
          sleep 1
        done
      }
      
      # Function to stop server
      stop_server() {
        if [ -n "$SERVER_PID" ]; then
          echo "Stopping server (PID $SERVER_PID)..."
          /bin/kill -TERM $SERVER_PID 2>/dev/null || true
          # Wait for process to exit with timeout
          for i in $(seq 1 60); do
            if ! /bin/kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server stopped."
              SERVER_PID=""
              return 0
            fi
            sleep 1
          done
          echo "Server did not exit within 60s, force killing..."
          /bin/kill -9 $SERVER_PID 2>/dev/null || true
          sleep 1
        fi
        SERVER_PID=""
      }
      
      # Cleanup on exit
      trap stop_server EXIT
      
      # Run msgpack benchmark
      echo ""
      echo "=========================================="
      echo "Running msgpack benchmark (drop mode)..."
      echo "=========================================="
      start_server || exit 1
      k6 run benchmark/streams.msgpack.js
      stop_server
      
      # Run JSON benchmark
      echo ""
      echo "=========================================="
      echo "Running JSON benchmark (drop mode)..."
      echo "=========================================="
      start_server || exit 1
      k6 run benchmark/streams.json.js
      stop_server
      
      # Run protobuf benchmark
      echo ""
      echo "=========================================="
      echo "Running protobuf benchmark (drop mode)..."
      echo "=========================================="
      start_server || exit 1
      k6 run benchmark/streams.protobuf.js
      stop_server
      
      echo ""
      echo "All benchmarks (drop mode) complete!"
  bench:loadgen:
    desc: 'Build + run the realistic Go log generator (vars: TARGET, RATE, DURATION)'
    cmds:
    - go build -o /tmp/loge-loadgen ./cmd/loge-loadgen
    - '/tmp/loge-loadgen --target {{.TARGET | default "http://localhost:6500"}} --rate {{.RATE | default 4000}} --duration {{.DURATION | default "60s"}}'
  bench:query:
    desc: 'Run the k6 query scenarios — label, hot, cold, keyword (var: BASE)'
    cmds:
    - 'BASE={{.BASE | default "http://localhost:6500"}} k6 run benchmark/query/label.js'
    - 'BASE={{.BASE | default "http://localhost:6500"}} k6 run benchmark/query/hot.js'
    - 'BASE={{.BASE | default "http://localhost:6500"}} k6 run benchmark/query/cold.js'
    - 'BASE={{.BASE | default "http://localhost:6500"}} k6 run benchmark/query/keyword.js'
  bench:stats:
    desc: 'Show catalog tiering stats: local vs remote segments, rows, span (var: BASE)'
    cmds:
    - 'curl -s {{.BASE | default "http://localhost:6500"}}/api/v1/stats'
  bench:fly:storage:
    desc: 'Provision a Tigris bucket and set its secrets on the Fly app'
    cmds:
    - fly storage create
  bench:fly:deploy:
    desc: 'Deploy the loge benchmark app to Fly.io'
    cmds:
    - fly deploy
  bench:fly:teardown:
    desc: 'Destroy the Fly app and its volume (DESTRUCTIVE)'
    cmds:
    - fly apps destroy loge-bench
  bench:save:
    desc: 'Save unit benchmark results as the local baseline for bench:diff (var: COUNT)'
    cmds:
    - mkdir -p profiles/bench
    - go test -run '^$' -bench . -benchmem -count {{.COUNT | default 6}} ./... | tee profiles/bench/baseline.txt
    - go test -C worker -run '^$' -bench . -benchmem -count {{.COUNT | default 6}} ./... | tee -a profiles/bench/baseline.txt
  bench:diff:
    desc: 'Re-run unit benchmarks and compare against the saved baseline with benchstat (var: COUNT)'
    cmds:
    - go test -run '^$' -bench . -benchmem -count {{.COUNT | default 6}} ./... | tee profiles/bench/current.txt
    - go test -C worker -run '^$' -bench . -benchmem -count {{.COUNT | default 6}} ./... | tee -a profiles/bench/current.txt
    - go run golang.org/x/perf/cmd/benchstat@latest profiles/bench/baseline.txt profiles/bench/current.txt
  profile:ingest:
    desc: 'Capture cpu/heap/allocs/goroutine/mutex/block profiles under loadgen ingest (vars: RATE, DURATION, SECONDS)'
    cmds:
    - go build -o /tmp/loge-bench ./loge/main.go
    - go build -o /tmp/loge-loadgen ./cmd/loge-loadgen
    - |
      OUT="$(pwd)/profiles/ingest/$(date +%Y%m%d-%H%M%S)"
      mkdir -p "$OUT"
      rm -Rf tmp/
      # Kill any existing processes on port 6500
      lsof -ti:6500 | xargs kill -9 2>/dev/null || true
      sleep 1
      # Fast compaction so trigram/filter building fires inside the CPU window.
      /tmp/loge-bench --port 6500 --payload-size 100000 --buckets 2 \
        --compact-interval 5s --compact-min-files 4 \
        --pprof-port 6060 --pprof-block-rate 10000 --pprof-mutex-fraction 100 &

      echo "Waiting for server to be ready..."
      for i in $(seq 1 30); do
        nc -z localhost 6500 2>/dev/null && break
        if [ $i -eq 30 ]; then
          echo "Server failed to start within 30 seconds"
          lsof -ti:6500 | xargs kill -9 2>/dev/null || true
          exit 1
        fi
        sleep 1
      done
      # go-task's shell (mvdan/sh) reports job ids like "g1" for $! and has no
      # kill builtin — use the port's real PID and /bin/kill explicitly.
      SERVER_PID=$(lsof -ti:6500)
      trap '/bin/kill -TERM $SERVER_PID 2>/dev/null || true' EXIT

      /tmp/loge-loadgen --target http://localhost:6500 \
        --rate {{.RATE | default 8000}} --duration {{.DURATION | default "60s"}} &
      LOAD_PID=$!
      sleep 5  # let load ramp before sampling

      echo "Capturing CPU profile ({{.SECONDS | default 30}}s)..."
      curl -s -o "$OUT/cpu.pprof" "http://localhost:6060/debug/pprof/profile?seconds={{.SECONDS | default 30}}"
      for p in heap allocs goroutine mutex block; do
        curl -s -o "$OUT/$p.pprof" "http://localhost:6060/debug/pprof/$p"
      done

      wait $LOAD_PID || true
      /bin/kill -TERM $SERVER_PID 2>/dev/null || true
      for i in $(seq 1 60); do
        /bin/kill -0 $SERVER_PID 2>/dev/null || break
        sleep 1
      done
      /bin/kill -9 $SERVER_PID 2>/dev/null || true
      echo "profiles written to $OUT"
      go tool pprof -top -nodecount 10 "$OUT/cpu.pprof"
  profile:query:
    desc: 'Seed data with loadgen, then capture profiles under k6 query load (vars: SEED_RATE, SEED_DURATION, SECONDS)'
    cmds:
    - go build -o /tmp/loge-bench ./loge/main.go
    - go build -o /tmp/loge-loadgen ./cmd/loge-loadgen
    - |
      OUT="$(pwd)/profiles/query/$(date +%Y%m%d-%H%M%S)"
      mkdir -p "$OUT"
      rm -Rf tmp/
      # Kill any existing processes on port 6500
      lsof -ti:6500 | xargs kill -9 2>/dev/null || true
      sleep 1
      /tmp/loge-bench --port 6500 --payload-size 100000 --buckets 2 \
        --compact-interval 5s --compact-min-files 4 \
        --pprof-port 6060 --pprof-block-rate 10000 --pprof-mutex-fraction 100 &

      echo "Waiting for server to be ready..."
      for i in $(seq 1 30); do
        nc -z localhost 6500 2>/dev/null && break
        if [ $i -eq 30 ]; then
          echo "Server failed to start within 30 seconds"
          lsof -ti:6500 | xargs kill -9 2>/dev/null || true
          exit 1
        fi
        sleep 1
      done
      # go-task's shell (mvdan/sh) reports job ids like "g1" for $! and has no
      # kill builtin — use the port's real PID and /bin/kill explicitly.
      SERVER_PID=$(lsof -ti:6500)
      trap '/bin/kill -TERM $SERVER_PID 2>/dev/null || true' EXIT

      echo "Seeding data..."
      /tmp/loge-loadgen --target http://localhost:6500 \
        --rate {{.SEED_RATE | default 8000}} --duration {{.SEED_DURATION | default "30s"}}
      # Wait for flush + compaction so queries hit real segments.
      for i in $(seq 1 30); do
        TOTAL=$(curl -s http://localhost:6500/api/v1/stats | grep -o '"segments_total":[0-9]*' | cut -d: -f2)
        [ "${TOTAL:-0}" -gt 0 ] && break
        sleep 2
      done
      echo "Catalog has ${TOTAL:-0} segments; starting query load..."

      BASE=http://localhost:6500 DURATION=45s k6 run benchmark/query/hot.js &
      K6_PID=$!
      sleep 3
      echo "Capturing CPU profile ({{.SECONDS | default 30}}s)..."
      curl -s -o "$OUT/cpu.pprof" "http://localhost:6060/debug/pprof/profile?seconds={{.SECONDS | default 30}}"
      for p in heap allocs goroutine mutex block; do
        curl -s -o "$OUT/$p.pprof" "http://localhost:6060/debug/pprof/$p"
      done
      wait $K6_PID || true

      BASE=http://localhost:6500 k6 run benchmark/query/keyword.js || true

      /bin/kill -TERM $SERVER_PID 2>/dev/null || true
      for i in $(seq 1 60); do
        /bin/kill -0 $SERVER_PID 2>/dev/null || break
        sleep 1
      done
      /bin/kill -9 $SERVER_PID 2>/dev/null || true
      echo "profiles written to $OUT"
      go tool pprof -top -nodecount 10 "$OUT/cpu.pprof"
  profile:bench:
    desc: 'Run one Go benchmark with cpu+mem profiles (vars: BENCH, DIR, BENCHTIME)'
    cmds:
    - |
      OUT="$(pwd)/profiles/bench/$(date +%Y%m%d-%H%M%S)"
      mkdir -p "$OUT"
      # -C: DIR is a module/package dir (".", "worker"); one benchmark per run
      # so frames from other benchmarks don't pollute the profile.
      go test -C {{.DIR | default "."}} -run '^$' \
        -bench '{{.BENCH | default "BenchmarkLocalManager"}}' \
        -benchmem -benchtime {{.BENCHTIME | default "5s"}} \
        -cpuprofile "$OUT/cpu.pprof" -memprofile "$OUT/mem.pprof" -o "$OUT/bench.test" .
      echo "profiles written to $OUT"
      go tool pprof -top -nodecount 10 "$OUT/bench.test" "$OUT/cpu.pprof"
  profile:web:
    desc: 'Open the newest captured profile in go tool pprof web UI (var: PROFILE to override)'
    cmds:
    - |
      PROFILE='{{.PROFILE | default ""}}'
      if [ -z "$PROFILE" ]; then
        PROFILE=$(ls -t profiles/*/*/cpu.pprof 2>/dev/null | head -1)
      fi
      [ -n "$PROFILE" ] || { echo "no profiles found under profiles/"; exit 1; }
      echo "opening $PROFILE"
      go tool pprof -http=: "$PROFILE"